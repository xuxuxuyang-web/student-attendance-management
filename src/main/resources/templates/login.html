<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 60px;
            color: #667eea;
        }
        .login-header h3 {
            margin-top: 10px;
            color: #333;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .test-accounts {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="fas fa-graduation-cap"></i>
        <h3>学生信息管理系统</h3>
        <p class="text-muted">请登录您的账号</p>
    </div>

    <!-- 错误提示 -->
    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle"></i> 用户名或密码错误！
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 退出提示 -->
    <div th:if="${param.logout}" class="alert alert-info alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle"></i> 您已成功退出登录！
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 登录表单 -->
    <form th:action="@{/doLogin}" method="post">
        <div class="mb-3">
            <label class="form-label">用户名</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">密码</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
            <i class="fas fa-sign-in-alt"></i> 登录
        </button>
    </form>

    <!-- 测试账号信息 -->
    <div class="test-accounts">
        <strong><i class="fas fa-info-circle"></i> 测试账号：</strong><br>
        <span class="badge bg-primary">管理员</span> admin / admin123<br>
        <span class="badge bg-success">教师</span> teacher / teacher123<br>
        <span class="badge bg-info">学生</span> student / student123
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
