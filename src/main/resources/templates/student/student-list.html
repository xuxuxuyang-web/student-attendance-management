<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <!-- 统计卡片 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5>学生总数</h5>
                    <h2 th:text="${totalElements != null ? totalElements : students.size()}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5>男生人数</h5>
                    <h2 th:text="${maleCount != null ? maleCount : 0}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h5>女生人数</h5>
                    <h2 th:text="${femaleCount != null ? femaleCount : 0}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info">
                <div class="card-body">
                    <h5>班级数量</h5>
                    <h2 th:text="${classCount != null ? classCount : 0}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between">
            <h4 class="mb-0">学生列表</h4>
            <!-- 教师/管理员才显示新增按钮 -->
            <a th:if="${isTeacher}" th:href="@{/student/add}" class="btn btn-light btn-sm">+ 新增学生</a>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>班级</th>
                        <th>出生日期</th>
                        <th>联系方式</th>
                        <!-- 教师/管理员才显示操作列 -->
                        <th th:if="${isTeacher}">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.studentNo}">2023001</td>
                        <td th:text="${student.name}">张三</td>
                        <td>
                            <span th:if="${student.gender == '男'}" class="badge bg-primary">男</span>
                            <span th:if="${student.gender == '女'}" class="badge bg-danger">女</span>
                            <span th:if="${student.gender == null}" class="badge bg-secondary">未设置</span>
                        </td>
                        <td th:text="${student.className}">软件工程1班</td>
                        <td th:text="${student.birthDate}">2000-01-01</td>
                        <td th:text="${student.phone}">13800138001</td>
                        <!-- 教师/管理员才显示操作按钮 -->
                        <td th:if="${isTeacher}">
                            <a th:href="@{/student/edit/{id}(id=${student.id})}" class="btn btn-sm btn-warning">编辑</a>
                            <a th:href="@{/student/delete/{id}(id=${student.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除？')">删除</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td th:attr="colspan=${isTeacher} ? 7 : 6" class="text-center">暂无学生数据</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
