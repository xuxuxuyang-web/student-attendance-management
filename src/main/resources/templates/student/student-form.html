<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${student.id == null} ? '新增学生' : '修改学生'">学生表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header bg-primary text-white">
            <h3 th:text="${student.id == null} ? '新增学生' : '修改学生'" class="mb-0"></h3>
        </div>
        <div class="card-body">
            <form th:action="@{/student/save}" th:method="post" th:object="${student}">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label class="form-label">学号：</label>
                    <input type="text" class="form-control" th:field="*{studentNo}" required>
                    <small class="text-muted" th:if="${student.id != null}">学号不可修改</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">姓名：</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">性别：</label>
                    <select class="form-select" th:field="*{gender}">
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">班级：</label>
                    <input type="text" class="form-control" th:field="*{className}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">出生日期：</label>
                    <input type="date" class="form-control" th:field="*{birthDate}">
                </div>

                <div class="mb-3">
                    <label class="form-label">手机号：</label>
                    <input type="tel" class="form-control" th:field="*{phone}">
                </div>

                <div class="mb-3">
                    <label class="form-label">邮箱：</label>
                    <input type="email" class="form-control" th:field="*{email}">
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/student/list}" class="btn btn-secondary">返回</a>
                    <button type="submit" class="btn btn-primary" th:text="${student.id == null} ? '保存' : '更新'">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
