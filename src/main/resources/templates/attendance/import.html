<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>批量导入考勤记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .upload-card { max-width: 600px; margin: 50px auto; }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #0d6efd;
            background-color: #f0f8ff;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="upload-card">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-upload"></i> 批量导入考勤记录</h4>
            </div>
            <div class="card-body">
                <!-- 成功/错误提示 -->
                <div th:if="${success}" class="alert alert-success">
                    <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
                </div>
                <div th:if="${warning}" class="alert alert-warning">
                    <i class="fas fa-clock"></i> <span th:text="${warning}"></span>
                </div>

                <form th:action="@{/attendance/import}" method="post" enctype="multipart/form-data" id="uploadForm">
                    <div class="mb-4">
                        <div class="drop-zone" id="dropZone">
                            <i class="fas fa-file-excel fa-3x mb-3 text-success"></i>
                            <p>点击或拖拽文件到此区域上传</p>
                            <input type="file" name="file" id="fileInput" accept=".xlsx,.xls" style="display: none;" required>
                            <div id="fileName" class="text-muted mt-2"></div>
                        </div>
                        <div class="form-text text-muted mt-2">
                            支持 .xlsx 和 .xls 格式，文件大小不超过10MB
                        </div>
                    </div>

                    <div class="mb-3">
                        <a th:href="@{/attendance/template}" class="btn btn-secondary">
                            <i class="fas fa-download"></i> 下载模板
                        </a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                        <i class="fas fa-upload"></i> 上传并导入
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            updateFileName(files[0].name);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            updateFileName(e.target.files[0].name);
        }
    });

    function updateFileName(name) {
        fileName.innerHTML = '<i class="fas fa-check-circle text-success"></i> 已选择：' + name;
    }
</script>
</body>
</html>
