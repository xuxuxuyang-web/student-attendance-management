<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>考勤记录 - 学生考勤管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .stats-card { border-radius: 10px; padding: 15px; text-align: center; color: white; }
        .stats-normal { background: linear-gradient(135deg, #28a745, #20c997); }
        .stats-late { background: linear-gradient(135deg, #ffc107, #fd7e14); }
        .stats-total { background: linear-gradient(135deg, #17a2b8, #007bff); }
        .badge-normal { background-color: #28a745; }
        .badge-late { background-color: #ffc107; color: #333; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <!-- 统计卡片 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stats-card stats-total">
                <h5><i class="fas fa-chart-line"></i> 总打卡次数</h5>
                <h2 th:text="${totalCount}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card stats-normal">
                <h5><i class="fas fa-smile"></i> 正常</h5>
                <h2 th:text="${normalCount}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card stats-late">
                <h5><i class="fas fa-clock"></i> 迟到</h5>
                <h2 th:text="${lateCount}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card stats-total">
                <h5><i class="fas fa-calendar-times"></i> 缺勤</h5>
                <h2 th:text="${absentCount}">0</h2>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between">
            <h4 class="mb-0"><i class="fas fa-list"></i> 考勤记录</h4>
            <span th:if="${not isTeacher}" class="text-white">学生：<strong th:text="${studentName}"></strong></span>
        </div>
        <div class="card-body">
            <!-- 筛选条件 -->
            <form th:action="@{/attendance/list}" method="get" class="mb-4">
                <div class="row">
                    <div class="col-md-3 mb-2">
                        <label class="form-label">开始日期：</label>
                        <input type="date" class="form-control" name="startDate" th:value="${startDate}">
                    </div>
                    <div class="col-md-3 mb-2">
                        <label class="form-label">结束日期：</label>
                        <input type="date" class="form-control" name="endDate" th:value="${endDate}">
                    </div>
                    <div class="col-md-2 mb-2">
                        <label class="form-label">考勤状态：</label>
                        <select class="form-select" name="status">
                            <option value="">全部</option>
                            <option value="NORMAL" th:selected="${status == 'NORMAL'}">正常</option>
                            <option value="LATE" th:selected="${status == 'LATE'}">迟到</option>
                            <option value="ABSENT" th:selected="${status == 'ABSENT'}">缺勤</option>
                        </select>
                    </div>
                    <div class="col-md-2 mb-2">
                        <label class="form-label">课程：</label>
                        <select class="form-select" name="courseId">
                            <option value="">全部课程</option>
                            <option th:each="course : ${courses}" th:value="${course.id}"
                                    th:selected="${courseId == course.id}" th:text="${course.name}"></option>
                        </select>
                    </div>
                    <!-- 学生筛选（教师可见） -->
                    <div th:if="${isTeacher}" class="col-md-2 mb-2">
                        <label class="form-label">选择学生：</label>
                        <select class="form-select" name="studentId">
                            <option value="">全部学生</option>
                            <option th:each="stu : ${students}" th:value="${stu.id}"
                                    th:selected="${selectedStudentId == stu.id}"
                                    th:text="${stu.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-12 text-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-search"></i> 查询
                        </button>
                        <a th:href="@{/attendance/list}" class="btn btn-secondary">
                            <i class="fas fa-redo"></i> 重置
                        </a>
                    </div>
                </div>
            </form>

            <!-- 数据表格 -->
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th th:if="${isTeacher}">学生姓名</th>
                        <th>日期</th>
                        <th>课程名称</th>
                        <th>打卡时间</th>
                        <th>状态</th>
                        <th>备注</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="record : ${records}">
                        <td th:if="${isTeacher}" th:text="${record.studentName}">学生姓名</td>
                        <td th:text="${#temporals.format(record.checkInTime, 'yyyy-MM-dd')}">2024-01-01</td>
                        <td th:text="${record.courseName}">课程名称</td>
                        <td th:text="${#temporals.format(record.checkInTime, 'HH:mm:ss')}">08:00:00</td>
                        <td>
                                    <span class="badge"
                                          th:class="${record.status == 'NORMAL'} ? 'badge-normal' : (${record.status == 'LATE'} ? 'badge-late' : 'badge-normal')"
                                          th:text="${record.status == 'NORMAL'} ? '正常' : (${record.status == 'LATE'} ? '迟到' : '缺勤')">
                                        正常
                                    </span>
                        </td>
                        <td th:text="${record.remark != null ? record.remark : '-'}">-</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(records)}">
                        <td th:attr="colspan=${isTeacher} ? 6 : 5" class="text-center text-muted py-4">
                            <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                            暂无考勤记录，请先打卡
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <nav th:if="${totalPages > 0}">
                <ul class="pagination justify-content-center">
                    <li th:class="${currentPage == 1} ? 'page-item disabled' : 'page-item'">
                        <a class="page-link" th:href="@{/attendance/list(page=${currentPage - 1}, startDate=${startDate}, endDate=${endDate}, status=${status}, courseId=${courseId}, studentId=${selectedStudentId})}">上一页</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                        th:class="${i == currentPage} ? 'page-item active' : 'page-item'">
                        <a class="page-link" th:href="@{/attendance/list(page=${i}, startDate=${startDate}, endDate=${endDate}, status=${status}, courseId=${courseId}, studentId=${selectedStudentId})}" th:text="${i}">1</a>
                    </li>
                    <li th:class="${currentPage == totalPages} ? 'page-item disabled' : 'page-item'">
                        <a class="page-link" th:href="@{/attendance/list(page=${currentPage + 1}, startDate=${startDate}, endDate=${endDate}, status=${status}, courseId=${courseId}, studentId=${selectedStudentId})}">下一页</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
